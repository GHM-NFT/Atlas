h.value='PROOF';search.dispatchEvent(new Event('input'))}}else if(p==='gated'){const chip=[...d.querySelectorAll('.chip')].find(x=>x.dataset.v==='GATED');if(chip)chip.click()}else if(p==='clear'){if(reset)reset.click()}}));</script></body></html>
